name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Blocking gate: lint + unit tests + coverage thresholds (vitest.config.js).
  # Fully deterministic and platform-independent.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run coverage   # vitest run --coverage, fails if thresholds drop

  # Informational only: the committed screenshot baselines are rendered on macOS,
  # so Chromium on a Linux runner produces sub-pixel font/AA diffs. We still run
  # the suite to catch crashes/timeouts, but don't fail the build on pixel diffs.
  # Regenerate baselines per-platform with `npm run test:visual:update`.
  visual:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:visual

  # Build + push the multi-arch image to Docker Hub (the CI equivalent of
  # `npm run build`). Only on a push to main, and only once the blocking `test`
  # gate is green. Requires repo secrets DOCKERHUB_USERNAME and DOCKERHUB_TOKEN
  # (a Docker Hub access token); pushes jarod68/mine-sim:latest.
  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3        # emulation for the arm64 build
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: jarod68/mine-sim:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
