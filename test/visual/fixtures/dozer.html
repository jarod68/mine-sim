<!doctype html><html><head><meta charset="utf-8"><style>
  html,body{margin:0;background:#caa472}canvas{display:block}
</style></head><body>
<canvas id="c" width="520" height="360"></canvas>
<script type="module">
  // Freeze time so the flashing beacon renders in a deterministic state.
  try { performance.now = () => 0; } catch {}
  import { Vehicle } from '/public/components/vehicle.js';
  const ctx = document.getElementById('c').getContext('2d');
  ctx.fillStyle = '#caa472'; ctx.fillRect(0, 0, 520, 360);
  const dozer = new Vehicle({
    type: 'dozer', label: 'DZ01', model: 'Liebherr PR776',
    len: 26, wid: 16, gx: 0, gy: 0,
  });
  dozer.heading = 0;
  ctx.save();
  ctx.translate(260, 180);
  ctx.scale(11, 11);
  dozer.draw(ctx, false);
  ctx.restore();
  window.__ready = true;
</script>
</body></html>
