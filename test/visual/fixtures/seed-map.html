<!doctype html><html><head><meta charset="utf-8"><style>
  html,body{margin:0;background:#0c0f0d}canvas{display:block}
</style></head><body>
<canvas id="c"></canvas>
<script type="module">
  import { GameCanvas } from '/public/components/game-canvas.js';
  import { camera } from '/public/components/camera.js';

  // The spec injects window.__seedState (a seeded generateMine, significant blocks).
  const s = window.__seedState;
  // Rebuild the full grid (the rest default to unexplored), like the real client.
  const grid = [];
  for (let y = 0; y < s.rows; y++) {
    const row = [];
    for (let x = 0; x < s.cols; x++) row.push({ x, y, explored: false });
    grid.push(row);
  }
  for (const b of s.blocks) grid[b.y][b.x] = b;
  s.blocks = grid;

  const W = 760, H = 560;
  const scale = Math.min(W / s.view.w, H / s.view.h);
  camera.scale = scale;
  camera.ox = (W - s.view.w * scale) / 2;
  camera.oy = (H - s.view.h * scale) / 2;

  const gc = new GameCanvas(document.getElementById('c'), s, () => {});
  gc.resize(W, H);
  window.__ready = true;
</script>
</body></html>
