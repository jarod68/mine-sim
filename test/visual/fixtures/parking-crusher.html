<!doctype html><html><head><meta charset="utf-8"><style>
  html,body{margin:0;background:#1a140d}canvas{display:block}
</style></head><body>
<canvas id="c"></canvas>
<script type="module">
  import { Roads } from '/public/components/roads.js';
  import { camera } from '/public/components/camera.js';

  const view = { w: 800, h: 600 };
  const grid = { zoneCols: 40, zoneRows: 30, zoneW: 20, zoneH: 20 };
  const roads = new Roads(document.getElementById('c'), view, grid);

  // A bit of road linking a parking pad (left) to a crusher (right).
  const cells = [];
  for (let gx = 10; gx <= 28; gx++) cells.push({ gx, gy: 12, dir: { dx: 1, dy: 0 } });
  roads.load(cells);
  roads.addParking(5, 10, 6, 4);                 // parking pad ("P")
  roads.setCrushers([{ x: 29, y: 11, w: 3, h: 3 }]);   // crusher building

  camera.scale = 1.15; camera.ox = -70; camera.oy = -100;
  roads.resize(760, 420);   // triggers render
  window.__ready = true;
</script>
</body></html>
